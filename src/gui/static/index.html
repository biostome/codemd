<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claw Code</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="brand">
          <span class="brand-mark">CC</span>
          <span class="brand-name">Claw&nbsp;Code</span>
        </div>
        <button id="new-session-btn" class="btn-primary" type="button">+ New chat</button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Sessions</div>
        <div id="session-list" class="session-list">
          <div class="empty-state">Loading…</div>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Settings</div>
        <form id="settings-form" class="settings">
          <label>
            <span>Model</span>
            <input type="text" name="model" autocomplete="off" />
          </label>
          <label>
            <span>Base URL</span>
            <input type="text" name="base_url" autocomplete="off" />
          </label>
          <label>
            <span>Working dir</span>
            <input type="text" name="cwd" autocomplete="off" />
          </label>
          <label class="toggle">
            <input type="checkbox" name="allow_shell" />
            <span>Allow shell commands</span>
          </label>
          <label class="toggle">
            <input type="checkbox" name="allow_write" />
            <span>Allow write/edit</span>
          </label>
          <label class="toggle">
            <input type="checkbox" name="stream_model_responses" />
            <span>Stream model responses</span>
          </label>
          <label>
            <span>Temperature</span>
            <input type="number" name="temperature" min="0" max="2" step="0.1" />
          </label>
          <label>
            <span>Timeout (s)</span>
            <input type="number" name="timeout_seconds" min="1" step="1" />
          </label>
          <label>
            <span>Max turns</span>
            <input type="number" name="max_turns" min="1" step="1" />
          </label>
          <details class="settings-advanced">
            <summary>Context management</summary>
            <label>
              <span>Auto-snip threshold (tokens, blank = off)</span>
              <input type="number" name="auto_snip_threshold_tokens" min="1" step="1" />
            </label>
            <label>
              <span>Auto-compact threshold (tokens, blank = off)</span>
              <input type="number" name="auto_compact_threshold_tokens" min="1" step="1" />
            </label>
            <label>
              <span>Messages preserved on compact</span>
              <input type="number" name="compact_preserve_messages" min="0" step="1" />
            </label>
            <label class="toggle">
              <input type="checkbox" name="disable_claude_md_discovery" />
              <span>Disable CLAUDE.md discovery</span>
            </label>
            <label>
              <span>Additional working dirs (one per line)</span>
              <textarea name="additional_working_directories" rows="3" spellcheck="false"></textarea>
            </label>
          </details>
          <details class="settings-advanced">
            <summary>System prompt &amp; structured output</summary>
            <label>
              <span>Custom system prompt</span>
              <textarea name="custom_system_prompt" rows="3"></textarea>
            </label>
            <label>
              <span>Append to system prompt</span>
              <textarea name="append_system_prompt" rows="3"></textarea>
            </label>
            <label>
              <span>Override system prompt (skip default)</span>
              <textarea name="override_system_prompt" rows="3"></textarea>
            </label>
            <label>
              <span>Response schema (JSON, blank to disable)</span>
              <textarea name="response_schema" rows="6" spellcheck="false"></textarea>
            </label>
            <label>
              <span>Schema name</span>
              <input type="text" name="response_schema_name" autocomplete="off" />
            </label>
            <label class="toggle">
              <input type="checkbox" name="response_schema_strict" />
              <span>Strict schema enforcement</span>
            </label>
          </details>
          <details class="settings-advanced">
            <summary>Budgets &amp; limits (blank = unlimited)</summary>
            <label>
              <span>Max cost (USD)</span>
              <input type="number" name="max_total_cost_usd" min="0" step="0.01" />
            </label>
            <label>
              <span>Max total tokens</span>
              <input type="number" name="max_total_tokens" min="1" step="1" />
            </label>
            <label>
              <span>Max input tokens</span>
              <input type="number" name="max_input_tokens" min="1" step="1" />
            </label>
            <label>
              <span>Max output tokens</span>
              <input type="number" name="max_output_tokens" min="1" step="1" />
            </label>
            <label>
              <span>Max reasoning tokens</span>
              <input type="number" name="max_reasoning_tokens" min="1" step="1" />
            </label>
            <label>
              <span>Max tool calls</span>
              <input type="number" name="max_tool_calls" min="1" step="1" />
            </label>
            <label>
              <span>Max model calls</span>
              <input type="number" name="max_model_calls" min="1" step="1" />
            </label>
            <label>
              <span>Max delegated tasks</span>
              <input type="number" name="max_delegated_tasks" min="1" step="1" />
            </label>
            <label>
              <span>Max session turns</span>
              <input type="number" name="max_session_turns" min="1" step="1" />
            </label>
          </details>
          <button type="submit" class="btn-secondary">Save</button>
        </form>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Ready</span>
        </div>
        <div class="topbar-right">
          <button id="slash-btn" class="btn-ghost" type="button" title="Slash commands">/</button>
          <button id="skills-btn" class="btn-ghost" type="button" title="Skills">★</button>
          <button id="clear-btn" class="btn-ghost" type="button" title="Clear runtime state">⟲</button>
        </div>
      </header>

      <section id="chat" class="chat">
        <div id="welcome" class="welcome">
          <h1>Claw Code</h1>
          <p>Type a message below to start. Use the <code>/</code> button for slash commands or <code>★</code> for skills.</p>
        </div>
      </section>

      <footer class="composer">
        <div id="paste-chips" class="paste-chips" hidden></div>
        <div class="composer-inner">
          <textarea
            id="prompt-input"
            placeholder="Send a message…  (Enter to send, Shift+Enter for newline · large pastes auto-collapse)"
            rows="1"
            autocomplete="off"
          ></textarea>
          <button id="send-btn" type="button" class="btn-send" title="Send">Send</button>
        </div>
        <div class="composer-meta">
          <span id="cwd-meta"></span>
          <span id="usage-meta"></span>
        </div>
      </footer>
    </main>
  </div>

  <div id="palette" class="palette hidden">
    <div class="palette-card">
      <div class="palette-head">
        <input
          id="palette-search"
          type="text"
          placeholder="Filter…"
          autocomplete="off"
        />
        <button class="btn-ghost" id="palette-close" type="button">✕</button>
      </div>
      <div id="palette-list" class="palette-list"></div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
